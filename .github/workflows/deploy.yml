name: Build e Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/agente-de-atendimento:latest

      - name: Disparar atualizacao no Watchtower
        continue-on-error: true
        env:
          WATCHTOWER_URL: ${{ secrets.WATCHTOWER_URL }}
          WATCHTOWER_TOKEN: ${{ secrets.WATCHTOWER_TOKEN }}
        run: |
          if [ -n "$WATCHTOWER_URL" ]; then
            curl -f -X POST "$WATCHTOWER_URL/v1/update" \
              -H "Authorization: Bearer $WATCHTOWER_TOKEN"
          else
            echo "WATCHTOWER_URL nao configurado, pulando."
          fi
