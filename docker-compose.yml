services:
  app:
    image: da1click/agente-de-atendimento:latest
    container_name: agente-de-atendimento
    restart: always
    expose:
      - "8000"
    env_file:
      - .env
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: always
    expose:
      - "8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - web

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
